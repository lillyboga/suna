# Prod values for the kortix-gateway chart. Runs in the SAME namespace as
# kortix-api (kortix-prod), reusing its ServiceAccount (kortix-api) + synced
# secret (kortix-api-env). Deployed by Argo CD — a PR bumping image.tag IS the
# deploy; git revert is the rollback.

# Immutable release tag (promote bumps this). NOT :latest in GitOps.
image:
  tag: "0.9.38"

# Prod HA: 3-replica floor, burst to 12 (matches the API's envelope).
replicas: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"

ingress:
  enabled: true
  host: gateway-eks.kortix.com
  # ACM cert ARN for gateway-eks.kortix.com — provision a cert for this host
  # (infra/terraform … module.acm, same as the API's) and paste the ARN here.
  certificateArn: ""
  cloudflareProxied: true
