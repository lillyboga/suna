# Argo CD Application for the EKS dev LLM gateway (gateway-dev.kortix.com).
#
# Runs in the SAME namespace as kortix-dev, reusing its ServiceAccount + synced
# secret (kortix-api-env) — so this app depends on kortix-dev having created
# them first; Argo retries until they exist. Tracks `main`; deploy-dev-eks.yml
# bumps infra/k8s/envs/dev/gateway-values.yaml image.tag on every push to main.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-gateway-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kortix-ai/suna.git
    targetRevision: main
    path: infra/k8s/charts/kortix-gateway
    helm:
      releaseName: kortix-gateway
      valueFiles:
        - ../../envs/dev/gateway-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kortix-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
