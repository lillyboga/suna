# Defaults for the kortix-gateway chart. The standalone LLM gateway runs as its
# own Deployment in the SAME namespace as kortix-api, so it reuses the API's
# ServiceAccount (IRSA) and already-synced secret bundle (kortix-api-env) — no
# SA/role/ExternalSecret of its own. Per-env values (image tag, ingress host,
# cert ARN) come from envs/<env>/gateway-values.yaml.

image:
  repository: kortix/kortix-gateway
  tag: latest
  pullPolicy: IfNotPresent

createNamespace: false

containerPort: 8090

# replicas is the HPA floor. The gateway is I/O / connection-bound (long-lived
# LLM streams), not CPU-bound, so memory is the primary scale signal.
replicas: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 12
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

pdb:
  enabled: true
  minAvailable: 50%

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

# Streaming-safe drain: LLM responses last minutes, so let in-flight streams
# finish before exit. preStop sleep lets the ALB deregister the pod first so no
# NEW stream lands on a terminating one.
terminationGracePeriodSeconds: 300
preStopSleepSeconds: 15

health:
  path: /health
  startupFailureThreshold: 12
  livenessPeriodSeconds: 15
  readinessPeriodSeconds: 10

# Reuse the API's ServiceAccount (same namespace); its IRSA already reads the
# Secrets Manager bundle.
serviceAccount:
  name: kortix-api

# Reuse the API's already-synced secret (kortix-api-env). It carries
# GATEWAY_INTERNAL_TOKEN + LANGFUSE_* that the gateway reads via envFrom.
envFromSecret: kortix-api-env

# Non-secret env. KORTIX_API_URL = the in-cluster API Service (same namespace),
# so the gateway's auth/resolve/billing/usage hooks reach the API over ClusterIP
# — never the public internet.
extraEnv:
  KORTIX_API_URL: http://kortix-api:8000

topologySpread:
  enabled: true

# Plain rolling Deployment (no canary) — same delivery model as the API.
rollout:
  enabled: false

ingress:
  enabled: true
  host: gateway-eks.kortix.com
  certificateArn: ""
  extraHosts: []
  extraCertificateArns: []
  albGroup: ""
  cloudflareProxied: true
  # Long idle timeout for streaming LLM responses (matches the API).
  idleTimeout: 300
  inboundCidrs: ""
