{{- if .Values.ingress.enabled }}
{{- if not .Values.ingress.certificateArn }}
{{- fail "ingress.certificateArn is required (the ACM cert ARN from terraform output acm_certificate_arn)" }}
{{- end }}
# The AWS Load Balancer Controller turns this Ingress into a real ALB (the same
# shape as the ECS stack: internet-facing, ACM TLS, :80 -> :443 redirect, IP
# targets, /v1/health checks). external-dns then points api-eks.kortix.com at it
# (Cloudflare, proxied).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kortix-gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-gateway.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    {{- if .Values.ingress.albGroup }}
    # Join a shared ALB (one LB, host-routed) instead of provisioning one per
    # Ingress — used by PR previews so N ephemeral envs share a single ALB.
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.albGroup | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    # Primary cert + any extra certs (multi-host ALB serves the right one via SNI).
    alb.ingress.kubernetes.io/certificate-arn: {{ prepend (.Values.ingress.extraCertificateArns | default list) .Values.ingress.certificateArn | join "," | quote }}
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.health.path | quote }}
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200-399"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds={{ .Values.ingress.idleTimeout }}
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
    {{- if .Values.ingress.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.ingress.inboundCidrs | quote }}
    {{- end }}
    # external-dns: create the proxied Cloudflare record(s) for these host(s) -> the ALB.
    external-dns.alpha.kubernetes.io/hostname: {{ prepend (.Values.ingress.extraHosts | default list) .Values.ingress.host | join "," | quote }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: {{ .Values.ingress.cloudflareProxied | quote }}
spec:
  ingressClassName: alb
  rules:
    {{- range prepend (.Values.ingress.extraHosts | default list) .Values.ingress.host }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "kortix-gateway.name" $ }}
                port:
                  name: http
    {{- end }}
{{- end }}
