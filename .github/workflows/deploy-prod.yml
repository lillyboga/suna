name: Deploy Prod

# PROD pipeline. Runs when `prod` advances — i.e. when a reviewed promote PR is
# MERGED (promote.yml opens it) — or on manual dispatch. This is the ONLY place
# a version is published: the tag `vX.Y.Z`, the GitHub Release, the image retag,
# the EKS deploy, and the frontend all happen here, never before the prod merge.
# The root VERSION on `prod` is the clean version `X.Y.Z`.
#
#   1. Retag the dev images (kortix/kortix-*:dev-latest) → :X.Y.Z + :latest
#      (multi-arch manifest copy, zero rebuilds).
#   2. Build the prod CLI (4 targets, default api.kortix.com) + prod desktop
#      installers and cut a single GitHub Release `vX.Y.Z`.
#   3. EKS deploy (primary): the promote PR merge already bumped
#      infra/k8s/envs/prod, so Argo CD rolls the prod Deployment — this job
#      WATCHES it reach vX.Y.Z and announces to Slack.
#   3b. ECS Fargate deploy (fallback): in PARALLEL, roll the kortix-prod ECS
#      service onto the same vX.Y.Z so it stays a warm hot-standby (never gates
#      the release). See the deploy-api-ecs job.
#   4. Deploy the prod frontend on Vercel (the `prod` branch → kortix.com).
#
# The prod stack is api.kortix.com → EKS (primary) + kortix.com (Vercel).
# api.kortix.com is a Cloudflare Worker (infra/cloudflare/workers/api-router) that
# routes to EKS (api-eks, ACTIVE_BACKEND=eks) or the ECS Fargate hot-standby
# (api-ecs-fargate) — flip ACTIVE_BACKEND to fail over instantly. EKS rolls via
# Argo CD GitOps; ECS rolls here in parallel. Both run the same image against the
# same DB (one global worker-leader lease), so a flip is safe.

on:
  push:
    branches: [prod]
  workflow_dispatch:
  # Promotion is review-gated: promote.yml opens a PR into `prod`, and a human
  # MERGES it after approval. That merge is a real `push` to `prod` (above) and
  # triggers this pipeline normally — so no workflow_run hook is needed (and we
  # must NOT deploy merely because Promote *opened* the PR).

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Resolve the version from VERSION ────────────────────────────────────────
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    # Runs on every push to `prod` (i.e. a merged, reviewed release PR) and on
    # manual dispatch.
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      title: ${{ steps.v.outputs.title }}
      notes: ${{ steps.v.outputs.notes }}
      source_sha: ${{ steps.v.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full tags + annotations to read the release notes
      - name: Read VERSION + release notes (committed by the promote PR)
        id: v
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < VERSION)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Publishing v$V"

          # promote.yml committed RELEASE_NOTES.md (line 1 = title, rest = notes)
          # onto the release branch; it merged into prod with this release. The
          # tag does NOT exist yet — the GitHub Release job creates it at this
          # prod commit. (Nothing was published before this merge.)
          if [ -f RELEASE_NOTES.md ]; then
            echo "title=$(head -n1 RELEASE_NOTES.md)" >> "$GITHUB_OUTPUT"
            {
              echo 'notes<<KORTIX_NOTES_EOF'
              tail -n +3 RELEASE_NOTES.md
              echo 'KORTIX_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "title=" >> "$GITHUB_OUTPUT"
            { echo 'notes<<KORTIX_NOTES_EOF'; echo 'KORTIX_NOTES_EOF'; } >> "$GITHUB_OUTPUT"
          fi

          # The exact source commit this release was cut from (stamped by
          # promote.yml). Empty for legacy releases that predate SHA stamping.
          if [ -f RELEASE_SOURCE_SHA ]; then
            SRC="$(tr -d '[:space:]' < RELEASE_SOURCE_SHA)"
            echo "source_sha=$SRC" >> "$GITHUB_OUTPUT"
            echo "Release source commit: $SRC"
          else
            echo "source_sha=" >> "$GITHUB_OUTPUT"
            echo "No RELEASE_SOURCE_SHA (legacy release) — will retag :dev-latest"
          fi

  # ── Retag dev images → versioned + latest (no rebuild) ──────────────────────
  retag-images:
    name: Re-tag dev → v${{ needs.version.outputs.version }}
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Re-tag release images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SOURCE_SHA: ${{ needs.version.outputs.source_sha }}
        run: |
          set -euo pipefail
          # Per image, prefer the dev image built from the EXACT promoted commit
          # (dev-<sha8>). deploy-dev only rebuilds the surfaces a commit touched,
          # so that tag exists only for changed surfaces — an api-only commit has
          # no frontend dev-<sha8>, and vice-versa. For an UNCHANGED surface,
          # :dev-latest IS that surface's current image, and promote.yml's
          # pre-flight green-gate already guarantees this commit's builds finished
          # (no stale-image race). So: pin to dev-<sha8> when present, else fall
          # back to :dev-latest. Fail only if neither exists (nothing to ship).
          SHA8=""
          [ -n "${SOURCE_SHA:-}" ] && SHA8="dev-${SOURCE_SHA:0:8}"
          for IMAGE in kortix/kortix-api kortix/kortix-gateway kortix/kortix-frontend; do
            if [ -n "$SHA8" ] && docker buildx imagetools inspect "$IMAGE:$SHA8" >/dev/null 2>&1; then
              SRC_TAG="$SHA8"
            elif docker buildx imagetools inspect "$IMAGE:dev-latest" >/dev/null 2>&1; then
              SRC_TAG="dev-latest"
              echo "::notice::$IMAGE has no $SHA8 (surface unchanged in this commit) — using :dev-latest."
            else
              echo "::error::$IMAGE: neither ${SHA8:-dev-<sha8>} nor :dev-latest is published — no dev image to promote."
              exit 1
            fi
            echo "Re-tagging $IMAGE:$SRC_TAG → $IMAGE:${VERSION} + $IMAGE:latest"
            docker buildx imagetools create \
              --tag "$IMAGE:${VERSION}" \
              --tag "$IMAGE:latest" \
              "$IMAGE:$SRC_TAG"
            echo "✓ $IMAGE:${VERSION} (from $SRC_TAG)"
          done
      - name: Summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          {
            echo "### Re-tagged dev-latest → v${VERSION}"
            echo "- \`kortix/kortix-api:${VERSION}\` (multi-arch)"
            echo "- \`kortix/kortix-frontend:${VERSION}\` (multi-arch)"
            echo ""
            echo "_Zero rebuilds — re-tagged from dev-latest manifests._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build prod CLI (4 targets on one Linux runner via Bun cross-compile) ────
  build-cli:
    name: Build prod CLI (all targets)
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps (pnpm)
        # The repo's lockfile is pnpm format; `bun install` cannot migrate it
        # ("PnpmLockfileTooOld"), so install deps with pnpm and compile with bun.
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build every target (Bun cross-compile)
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          API_BASE="https://api.kortix.com"
          mkdir -p artifacts
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "↻ building kortix-$t (cli $VERSION)"
            bun build \
              --compile \
              --minify \
              --target="bun-$t" \
              --define="process.env.KORTIX_CLI_VERSION=\"${VERSION}\"" \
              --define="process.env.KORTIX_DEFAULT_API_BASE=\"${API_BASE}\"" \
              --outfile="artifacts/kortix-$t" \
              apps/cli/src/index.ts
          done
          cd artifacts
          chmod +x kortix-*
          ls -lh

      - name: Smoke test (native linux-x64)
        run: ./artifacts/kortix-linux-x64 version

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
          if-no-files-found: error

  # ── Build prod desktop installers (per-OS signed matrix) ────────────────────
  build-desktop:
    name: Build prod desktop ${{ matrix.target_pretty }}
    needs: version
    runs-on: ${{ matrix.runner }}
    env:
      DESKTOP_URL: https://kortix.com/projects
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_pretty: macos-arm64
            runner: macos-14
            bundles: dmg
            artifact: desktop-macos-arm64
            files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - target_pretty: macos-x64
            # macos-13 (Intel) GitHub-hosted runners are retired, so this job
            # queued forever waiting for a runner. Cross-compile the x64 build
            # on the Apple-Silicon runner via the x86_64 Rust target instead.
            runner: macos-14
            rust_target: x86_64-apple-darwin
            bundles: dmg
            artifact: desktop-macos-x64
            files: apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - target_pretty: windows-x64
            runner: windows-2022
            bundles: msi
            artifact: desktop-windows-x64
            files: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          - target_pretty: linux-x64
            runner: ubuntu-22.04
            bundles: appimage
            artifact: desktop-linux-x64
            files: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compile target
        if: matrix.rust_target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kortix/desktop
        env:
          npm_config_engine_strict: "false"

      # Never hard-fail on missing certs — a release should always ship an
      # installer. Sign (+ notarize on macOS) when the platform's secrets are
      # present; otherwise build UNSIGNED (Gatekeeper/SmartScreen warning).
      - name: Decide signing
        id: sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          enabled=false
          case "${{ runner.os }}" in
            macOS)   [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            Windows) [ -n "$WINDOWS_CERTIFICATE" ] && [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            *)       enabled=true ;;
          esac
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          [ "$enabled" = true ] && echo "::notice::${{ runner.os }} signing ENABLED." \
                                || echo "::warning::${{ runner.os }} signing secrets absent — building UNSIGNED."

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS' && steps.sign.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && steps.sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Configure production desktop build
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SIGN_ENABLED: ${{ steps.sign.outputs.enabled }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/desktop/src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.version = process.env.VERSION;
          config.productName = 'Kortix';
          config.identifier = 'com.kortix.desktop';
          if (process.env.SIGN_ENABLED === 'true' && process.env.WINDOWS_CERTIFICATE_THUMBPRINT) {
            config.bundle ||= {};
            config.bundle.windows ||= {};
            config.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERTIFICATE_THUMBPRINT;
            config.bundle.windows.digestAlgorithm = 'sha256';
            config.bundle.windows.timestampUrl = process.env.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com';
          }
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Prepare desktop shell assets
        run: pnpm --filter @kortix/desktop run prepare-assets

      # Apple env vars only when signing is enabled → Tauri signs + notarizes;
      # empty otherwise → unsigned bundle.
      - name: Build desktop installer
        run: pnpm --filter @kortix/desktop tauri build --bundles ${{ matrix.bundles }}${{ matrix.rust_target && format(' --target {0}', matrix.rust_target) || '' }}
        env:
          KORTIX_DESKTOP_DEFAULT_URL: ${{ env.DESKTOP_URL }}
          APPLE_CERTIFICATE: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_ISSUER: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && (secrets.APPLE_PASSWORD || secrets.APPLE_APP_SPECIFIC_PASSWORD) || '' }}
          APPLE_TEAM_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  # ── Cut a single GitHub Release vX.Y.Z (CLI + desktop) ──────────────────────
  # Cut the release as soon as the CLI + images are ready — it does NOT wait on
  # desktop. Desktop builds on slow, scarce, signed macOS/Windows runners that
  # can get stuck queued for ~50min (or fail on a cert problem); waiting on them
  # would block every release. Desktop installers are attached afterward by the
  # separate `attach-desktop` job, best-effort. So a desktop problem can never
  # delay or block the API/frontend/CLI release.
  github-release:
    name: GitHub Release v${{ needs.version.outputs.version }}
    needs: [version, retag-images, build-cli]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/

      - name: Assemble release assets + checksums
        run: |
          set -euo pipefail
          mkdir -p release
          cp -v artifacts/kortix-* release/
          cd release
          sha256sum * > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          # Human title + notes from the tag annotation (set at promote time) lead
          # the release; the auto-generated PR list is appended below them.
          name: ${{ needs.version.outputs.title != '' && format('{0} — {1}', needs.version.outputs.tag, needs.version.outputs.title) || needs.version.outputs.tag }}
          body: ${{ needs.version.outputs.notes }}
          generate_release_notes: true
          files: |
            release/*

  # ── Attach desktop installers to the release (best-effort, non-blocking) ─────
  # Runs after the release is already cut. Uploads whatever desktop installers
  # built; if desktop failed entirely it's a no-op and the release simply ships
  # without installers (re-run desktop + this job later to add them).
  attach-desktop:
    name: Attach desktop installers
    needs: [version, github-release, build-desktop]
    if: always() && needs.github-release.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: desktop-artifacts/
          pattern: desktop-*
          merge-multiple: true

      - name: Upload installers to the release (if any built)
        run: |
          set -euo pipefail
          if [ ! -d desktop-artifacts ] || [ -z "$(ls -A desktop-artifacts 2>/dev/null)" ]; then
            echo "::warning::No desktop installers built — release ships CLI + images only."
            exit 0
          fi
          cd desktop-artifacts
          sha256sum * > DESKTOP-SHA256SUMS
          gh release upload "${{ needs.version.outputs.tag }}" * --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy API to prod (EKS / Argo CD GitOps) ───────────────────────────────
  # The promote PR merge already bumped infra/k8s/envs/prod/values.yaml (image tag
  # + kortixVersion), so Argo CD on the prod-eks cluster rolls the Deployment.
  # This job WATCHES that roll finish on exactly :VERSION, then announces to Slack.
  # kortixVersion comes from the values bump, so /v1/health reports the clean
  # X.Y.Z — no task-def version stamping like the old ECS roll needed.
  deploy-api:
    name: Deploy API to prod (EKS / GitOps)
    needs: [version, retag-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → read the cluster
      contents: read
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-prod-eks
      NAMESPACE: kortix-prod
      APP: kortix-api
      API_HOST: api-eks.kortix.com
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — cluster exists
        id: guard
        run: |
          if aws eks describe-cluster --name "$CLUSTER" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::EKS cluster not found — skipping (not applied yet)."
          fi

      - name: Update kubeconfig
        if: steps.guard.outputs.exists == 'true'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      # Wait for Argo CD to reconcile the promote bump and the Deployment to finish
      # rolling out exactly :VERSION — Argo applied the new spec (observedGeneration
      # caught up) AND every replica is updated + available. A release whose pods
      # never go Ready never satisfies this, so the success message never fires.
      - name: Wait for Deployment rolled out @ v${{ needs.version.outputs.version }}
        if: steps.guard.outputs.exists == 'true'
        id: wait
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -uo pipefail
          for i in $(seq 1 80); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            gen="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.metadata.generation}' 2>/dev/null || true)"
            obs="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.observedGeneration}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            updated="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/80) image=${img:-?} gen=${obs:-?}/${gen:-?} updated=${updated:-0}/${desired:-?} available=${avail:-0}"
            if printf '%s' "$img" | grep -q ":${VERSION}$" \
               && [ -n "$desired" ] && [ "${obs:-0}" -ge "${gen:-1}" ] \
               && [ "${updated:-0}" = "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "deployed=true" >> "$GITHUB_OUTPUT"
              echo "✓ EKS Deployment rolled out on :${VERSION} (${avail}/${desired} ready)"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Deployment did not roll out to :${VERSION} within ~20m (stuck or pods never became Ready). No release announcement sent."
          exit 1

      # Source the truth from the running service (the commit field we bake in).
      - name: Read live /v1/health
        if: steps.guard.outputs.exists == 'true' && steps.wait.outputs.deployed == 'true'
        id: health
        run: |
          set -uo pipefail
          h="$(curl -s --max-time 10 "https://${API_HOST}/v1/health" || true)"
          echo "commit=$(printf '%s' "$h" | jq -r '.commit // ""' 2>/dev/null)" >> "$GITHUB_OUTPUT"

      - name: Announce to Slack
        if: steps.guard.outputs.exists == 'true' && steps.wait.outputs.deployed == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_RELEASE_CHANNEL: ${{ secrets.SLACK_RELEASE_CHANNEL }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
          TITLE: ${{ needs.version.outputs.title }}
          NOTES: ${{ needs.version.outputs.notes }}
          META_SHA: ${{ needs.version.outputs.source_sha }}
          LIVE_COMMIT: ${{ steps.health.outputs.commit }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ -z "${SLACK_RELEASE_CHANNEL:-}" ]; then
            echo "::notice::SLACK_BOT_TOKEN / SLACK_RELEASE_CHANNEL not set — skipping Slack."
            exit 0
          fi

          # Prefer the commit actually serving (/v1/health); fall back to the
          # promoted source SHA. Truncate notes to a Slack-safe length.
          SHA="${LIVE_COMMIT:-$META_SHA}"
          SHA8="${SHA:0:8}"
          [ -n "$SHA8" ] || SHA8="unknown"
          NOTES="$(printf '%s' "${NOTES:-}" | head -c 1200)"
          REL_URL="${SERVER}/${REPO}/releases/tag/${TAG}"
          COMMIT_URL="${SERVER}/${REPO}/commit/${SHA}"

          payload="$(jq -n \
            --arg channel "$SLACK_RELEASE_CHANNEL" \
            --arg header "🚀 Kortix ${TAG} is live (EKS)" \
            --arg title "${TITLE:-Release $TAG}" \
            --arg notes "${NOTES:-}" \
            --arg version "$VERSION" \
            --arg sha8 "$SHA8" \
            --arg commit_url "$COMMIT_URL" \
            --arg actor "$ACTOR" \
            --arg rel_url "$REL_URL" \
            --arg run_url "$RUN_URL" \
            '{
              channel: $channel,
              text: $header,
              blocks: [
                { type:"header", text:{ type:"plain_text", text:$header, emoji:true } },
                ( { type:"section", text:{ type:"mrkdwn",
                    text: ("*" + $title + "*" + (if $notes == "" then "" else ("\n" + $notes) end)) } } ),
                { type:"section", fields: [
                  { type:"mrkdwn", text: ("*Version*\n`" + $version + "`") },
                  { type:"mrkdwn", text: ("*Commit*\n<" + $commit_url + "|`" + $sha8 + "`>") },
                  { type:"mrkdwn", text: ("*Released by*\n" + $actor) },
                  { type:"mrkdwn", text: "*Where*\nEKS (Argo CD) · CLI · Desktop · Web" }
                ]},
                { type:"actions", elements: [
                  { type:"button", text:{ type:"plain_text", text:"📦 Release notes", emoji:true }, url:$rel_url },
                  { type:"button", text:{ type:"plain_text", text:"🚢 Argo CD", emoji:true }, url:"https://ops.kortix.com" },
                  { type:"button", text:{ type:"plain_text", text:"🔧 Pipeline", emoji:true }, url:$run_url }
                ]}
              ]
            }')"

          for attempt in 1 2 3 4 5; do
            resp="$(curl -sS --max-time 30 \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-type: application/json; charset=utf-8" \
              --data "$payload" \
              https://slack.com/api/chat.postMessage || true)"
            ok="$(printf '%s' "$resp" | jq -r '.ok // false' 2>/dev/null || echo false)"
            if [ "$ok" = "true" ]; then
              echo "✓ Slack notified (${SLACK_RELEASE_CHANNEL})"; exit 0
            fi
            err="$(printf '%s' "$resp" | jq -r '.error // "no_response"' 2>/dev/null || echo no_response)"
            echo "::warning::Slack attempt ${attempt}/5 failed: ${err}"
            case "$err" in
              invalid_auth|not_authed|account_inactive|token_revoked|channel_not_found|not_in_channel|is_archived|missing_scope)
                echo "::error::Slack permanent error '${err}'. Check SLACK_BOT_TOKEN (xoxb + chat:write), SLACK_RELEASE_CHANNEL (channel ID), and that the bot is invited to the channel."
                exit 1 ;;
            esac
            sleep $((attempt * 3))
          done
          echo "::error::Slack failed after 5 attempts (last: ${err})."; exit 1

  # ── Roll the prod ECS Fargate FALLBACK onto the new image ───────────────────
  # EKS is the live prod backend (deploy-api above); ECS Fargate is the always-
  # warm standby behind api-ecs-fargate.kortix.com, so the api.kortix.com Worker
  # can fail over to it instantly (flip ACTIVE_BACKEND → ecs-fargate). Runs in
  # PARALLEL with the EKS watch — it never gates the release. Both run the same
  # image against the same prod DB; safe because background-worker leadership is a
  # single global DB lease (apps/api/src/shared/leader-election.ts) → one leader.
  deploy-api-ecs:
    name: Deploy API to prod (ECS fallback)
    needs: [version, retag-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS role via GitHub OIDC
      contents: read
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-prod
      SERVICE: kortix-prod
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-ecs-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — ECS service exists
        id: guard
        run: |
          set -uo pipefail
          st="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
                --query 'services[0].status' --output text 2>/dev/null || true)"
          if [ "$st" = "ACTIVE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ECS fallback service $SERVICE not ACTIVE (status=$st) — skipping."
          fi

      - name: Roll the prod ECS fallback (clean version stamped)
        if: steps.guard.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # The image is retagged (not rebuilt), so it carries the promoted DEV
          # build's KORTIX_VERSION default. Register a new task-def revision that
          # stamps the clean X.Y.Z so the fallback's /v1/health reports e.g. 0.9.1
          # (matching EKS), not 0.9.1-dev.<sha>. Everything else is preserved.
          echo "Stamping KORTIX_VERSION=$VERSION onto a new kortix-prod task-def revision…"
          CURRENT_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$CURRENT_TD" \
            --query 'taskDefinition' --output json > td.json

          # Also pin the released image :X.Y.Z (retag-images just created it) so
          # the standby runs the EXACT same artifact as EKS — not the floating
          # dev-latest tag the old task def carried.
          jq --arg v "$VERSION" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
            | .containerDefinitions |= map(
                (if (.image | test("kortix/kortix-api"))
                   then .image = "kortix/kortix-api:\($v)" else . end)
                | .environment = ((.environment // []) | map(select(.name != "KORTIX_VERSION"))
                                 + [{name: "KORTIX_VERSION", value: $v}]))
          ' td.json > td-new.json

          NEW_TD=$(aws ecs register-task-definition --cli-input-json file://td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TD"

          echo "Rolling $SERVICE onto v$VERSION…"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$NEW_TD" --force-new-deployment >/dev/null
          # `wait services-stable` returns success even when the deployment
          # circuit breaker ROLLED BACK to the old task def (the service is
          # "stable" again — on the old revision). So don't trust it: after it
          # settles, assert the PRIMARY deployment is actually OUR $NEW_TD and
          # COMPLETED. Otherwise the roll failed and we must go red.
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE" || true
          PRIMARY_TD="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`]|[0].taskDefinition' --output text)"
          ROLLOUT="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`]|[0].rolloutState' --output text)"
          if [ "$PRIMARY_TD" != "$NEW_TD" ] || [ "$ROLLOUT" != "COMPLETED" ]; then
            echo "::error::ECS fallback roll did NOT land — primary=$PRIMARY_TD rollout=$ROLLOUT, expected $NEW_TD/COMPLETED (circuit breaker likely rolled back). Recent events:"
            aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].events[0:6].message' --output text || true
            exit 1
          fi
          echo "✓ ECS fallback on $NEW_TD (COMPLETED)"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].{running:runningCount,desired:desiredCount,rollout:deployments[0].rolloutState}' \
            --output table

      - name: Summary
        if: always() && steps.guard.outputs.exists == 'true'
        run: |
          h="$(curl -s --max-time 10 "https://api-ecs-fargate.kortix.com/v1/health" || true)"
          {
            echo "### Deployed API → **prod** (ECS Fargate fallback)"
            echo "v${{ needs.version.outputs.version }} rolled onto ECS service \`kortix-prod\` (standby behind api-ecs-fargate)."
            echo "Live: \`$(printf '%s' "$h" | jq -c '{version,commit,environment}' 2>/dev/null || echo '?')\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Prod frontend (Vercel) ──────────────────────────────────────────────────
  # No job here: the Vercel project is git-connected and auto-deploys the `prod`
  # branch on every push (→ kortix.com) — the same way dev.kortix.com
  # auto-deploys from `main`. The promote workflow's push to `prod` triggers it.
  frontend-note:
    name: Prod frontend (Vercel auto-deploys prod)
    needs: version  # gate with the rest of the pipeline (skipped on a failed promote)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          {
            echo "### Frontend → **prod** (Vercel)"
            echo "Vercel auto-deploys the \`prod\` branch (→ kortix.com). No action needed here."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Keep main's VERSION honest (post-publish, never premature) ──────────────
  # promote.yml does NOT bump main's VERSION (publishing is gated on the prod
  # merge). After a release publishes, advance main's VERSION to the NEXT dev
  # target (released patch + 1) so the single source of truth tracks prod: this
  # is what the Vercel dev frontend, desktop builds, and the API image default
  # read. `[skip ci]` keeps it from re-triggering the dev pipeline.
  sync-main-version:
    name: Sync main VERSION → next dev target
    needs: [version, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Advance main's VERSION to released patch + 1
        env:
          RELEASED: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          IFS='.' read -r MA MI PA <<< "$RELEASED"
          NEXT="${MA}.${MI}.$((PA + 1))"
          cur="$(tr -d '[:space:]' < VERSION 2>/dev/null || true)"
          if [ "$cur" = "$NEXT" ]; then echo "main already at $NEXT — nothing to do."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          printf '%s\n' "$NEXT" > VERSION
          git add VERSION
          git commit -m "chore(release): main VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          git push origin HEAD:main
