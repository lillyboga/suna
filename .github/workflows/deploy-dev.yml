name: Deploy Dev

# DEV pipeline. `main` is the dev branch: every push auto-deploys the things that
# change on most commits — API, frontend, CLI — as a DEV build versioned
# `<next>-dev.<sha8>`, where <next> is one patch above the latest published
# release tag (see the dev-version job). So dev tracks prod automatically and
# `main` carries no release-version bump.
#
#   - API image   → kortix/kortix-api:dev-<sha8> + :dev-latest, then deployed to
#                   BOTH dev backends in parallel: EKS (primary) via GitOps (the
#                   deploy-api job bumps infra/k8s/envs/dev/values.yaml to
#                   :dev-<sha8> and Argo CD rolls the Deployment; the workflow
#                   waits for it), and the ECS Fargate hot-standby (deploy-api-ecs
#                   force-rolls kortix-dev on :dev-latest). dev-api.kortix.com is a
#                   Cloudflare Worker that routes to either (dev-api-eks /
#                   dev-api-ecs-fargate) — see infra/cloudflare/workers/api-router.
#   - Frontend    → kortix/kortix-frontend:dev-<sha8> + :dev-latest (image is for
#                   self-hosters). dev.kortix.com itself is deployed by Vercel
#                   from `main` via Vercel's own Git integration — no deploy step.
#   - CLI         → 4 cross-compiled binaries published to the mutable
#                   `dev-latest` GitHub prerelease (default API base dev-api).
#
# Desktop is intentionally NOT here — it's a Tauri webview shell that changes
# rarely and needs slow signed macOS/Windows runners, so it lives in its own
# workflow (desktop.yml: only on apps/desktop/** changes or manual dispatch) and
# never blocks the CLI/API/frontend dev deploy.
#
# Promotion to production is a separate, manual workflow (promote.yml), which cuts
# the single unified vX.Y.Z release bundling API + frontend + CLI + desktop.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── Detect what changed (so unrelated surfaces are skipped) ─────────────────
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'apps/kortix-sandbox-agent-server/**'
              - 'apps/sandbox/**'
              - 'apps/cli/**'          # baked into the API image (sandbox kortix CLI)
              - 'packages/**'
              - 'supabase/migrations/**' # run by ensureSchema at boot — must redeploy to apply
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'VERSION'
            gateway:
              - 'apps/llm-gateway/**'
              - 'packages/llm-gateway/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            frontend:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'VERSION'
            cli:
              - 'apps/cli/**'
              - 'packages/starter/**'
              - 'scripts/install.sh'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'VERSION'
      - name: Summary
        run: |
          {
            echo "### Changes detected"
            echo "- API: ${{ steps.filter.outputs.api }}"
            echo "- Gateway: ${{ steps.filter.outputs.gateway }}"
            echo "- Frontend: ${{ steps.filter.outputs.frontend }}"
            echo "- CLI: ${{ steps.filter.outputs.cli }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Compute the dev version (single source of truth) ────────────────────────
  # Dev builds are a pre-release of the UPCOMING version, derived from the latest
  # published release tag (vX.Y.Z tags are created only when a release lands on
  # `prod`). So dev always tracks prod: prod 0.9.6 → dev `0.9.7-dev.<sha8>`. No
  # VERSION-file bump on `main` is needed (promote.yml never touches main).
  dev-version:
    name: Compute dev version
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to find the latest released version
      - name: Derive dev version from the latest release tag
        id: v
        run: |
          set -euo pipefail
          git fetch --tags --force origin >/dev/null 2>&1 || true
          # Strict vX.Y.Z only — excludes alias/stray tags like `v1` that would
          # otherwise sort highest and jump the dev version.
          LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          # Fallback to the VERSION file before the first tagged release.
          [ -n "$LATEST" ] || LATEST="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r MA MI PA <<< "$LATEST"
          : "${MA:=0}"; : "${MI:=0}"; : "${PA:=0}"
          NEXT="${MA}.${MI}.$((PA + 1))"
          echo "version=${NEXT}-dev.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${LATEST:-none} → dev ${NEXT}-dev.${GITHUB_SHA::8}"

  # ── Build + push the multi-arch API image ───────────────────────────────────
  build-api:
    name: Build API image (multi-arch)
    needs: [detect-changes, dev-version]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        # Bake the dev version (e.g. 0.9.7-dev.<sha8>) into the image so
        # /v1/health reports it. The immutable :dev-<sha8> tag (tag-api job below)
        # is the artifact's real identity.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SERVICE=apps/api
            KORTIX_VERSION=${{ needs.dev-version.outputs.version }}
            KORTIX_COMMIT=${{ github.sha }}
          tags: |
            kortix/kortix-api:dev-latest

  # docker/build-push-action's `tags` does not support shell slicing, so we
  # retag the published :dev-latest to the :dev-<sha8> immutable tag here.
  tag-api:
    name: Tag API dev-<sha8>
    needs: [detect-changes, build-api]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag :dev-latest → :dev-<sha8> (multi-arch manifest)
        id: tag
        run: |
          set -euo pipefail
          SHA8="${GITHUB_SHA::8}"
          docker buildx imagetools create \
            --tag "kortix/kortix-api:dev-${SHA8}" \
            "kortix/kortix-api:dev-latest"
          echo "image=kortix/kortix-api:dev-${SHA8}" >> "$GITHUB_OUTPUT"

  # ── Deploy the freshly-built image to the dev EKS cluster (GitOps) ──────────
  # Bump infra/k8s/envs/dev/values.yaml to the immutable :dev-<sha8> tag and
  # commit it to main ([skip ci] so this push doesn't re-trigger the workflow);
  # Argo CD on the dev-eks cluster reconciles it → rolling Deployment. Then wait
  # for the roll to finish on exactly that tag. (Replaces the old ECS roll.)
  deploy-api:
    name: Deploy API to dev (EKS / GitOps)
    needs: [detect-changes, tag-api]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → read the dev cluster
      contents: write # push the values bump to main
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-dev-eks
      NAMESPACE: kortix-dev
      APP: kortix-api
      API_HOST: dev-api-eks.kortix.com
      VALUES: infra/k8s/envs/dev/values.yaml
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy-dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump dev image tag + commit
        id: bump
        run: |
          set -euo pipefail
          TAG="dev-${GITHUB_SHA::8}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$(yq '.image.tag' "$VALUES")" = "$TAG" ]; then
            echo "values already at $TAG — no commit needed."
          else
            TAG="$TAG" yq -i '.image.tag = strenv(TAG)' "$VALUES"
            git config user.name  "kortix-ci[bot]"
            git config user.email "kortix-ci[bot]@users.noreply.github.com"
            git add "$VALUES"
            git commit -m "chore(dev-eks): deploy ${TAG} [skip ci]"
            # main moves fast; rebase onto any concurrent pushes before pushing.
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push origin main && break
              echo "push attempt ${attempt} lost a race — retrying"; sleep 3
            done
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — cluster exists
        id: guard
        run: |
          if aws eks describe-cluster --name "$CLUSTER" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::dev-eks cluster not found — bump committed, skipping watch."
          fi

      - name: Update kubeconfig
        if: steps.guard.outputs.exists == 'true'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      # Wait for Argo to reconcile the bump and the Deployment to finish rolling
      # out exactly :dev-<sha8> — Argo applied the new spec (observedGeneration
      # caught up) AND every replica is updated + available.
      - name: Wait for Deployment rolled out @ ${{ steps.bump.outputs.tag }}
        if: steps.guard.outputs.exists == 'true'
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -uo pipefail
          for i in $(seq 1 60); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            gen="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.metadata.generation}' 2>/dev/null || true)"
            obs="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.observedGeneration}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            updated="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/60) image=${img:-?} gen=${obs:-?}/${gen:-?} updated=${updated:-0}/${desired:-?} available=${avail:-0}"
            if printf '%s' "$img" | grep -q ":${TAG}$" \
               && [ -n "$desired" ] && [ "${obs:-0}" -ge "${gen:-1}" ] \
               && [ "${updated:-0}" = "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "✓ EKS dev rolled out on :${TAG} (${avail}/${desired} ready)"; exit 0
            fi
            sleep 15
          done
          echo "::error::dev Deployment did not roll out to :${TAG} within ~15m (Argo lag, stuck, or pods never Ready)."
          exit 1

      - name: Summary
        if: always() && steps.guard.outputs.exists == 'true'
        run: |
          h="$(curl -s --max-time 10 "https://${API_HOST}/v1/health" || true)"
          {
            echo "### Deployed API → **dev** (EKS / Argo CD GitOps)"
            echo "Image \`kortix/kortix-api:${{ steps.bump.outputs.tag }}\` → \`infra/k8s/envs/dev/values.yaml\` → Argo CD rolled the dev Deployment."
            echo "Live: \`$(printf '%s' "$h" | jq -c '{version,commit,environment}' 2>/dev/null || echo '?')\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Roll the dev ECS Fargate FALLBACK onto the same image ───────────────────
  # EKS is primary (deploy-api above); ECS Fargate is the always-warm standby
  # behind dev-api-ecs-fargate.kortix.com, so the dev-api Cloudflare Worker can
  # fail over to it instantly (flip ACTIVE_BACKEND → ecs-fargate). Runs in
  # PARALLEL with the EKS roll — it never gates or delays the primary deploy.
  # Both run the same image against the same dev DB; that's safe because
  # background-worker leadership is a single global DB lease
  # (apps/api/src/shared/leader-election.ts), so only one side ever runs cron.
  deploy-api-ecs:
    name: Deploy API to dev (ECS fallback)
    needs: [detect-changes, tag-api]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS role via GitHub OIDC
      contents: read
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-dev
      SERVICE: kortix-dev
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-ecs-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — ECS service exists
        id: guard
        run: |
          set -uo pipefail
          st="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
                --query 'services[0].status' --output text 2>/dev/null || true)"
          if [ "$st" = "ACTIVE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ECS fallback service $SERVICE not ACTIVE (status=$st) — skipping."
          fi

      - name: Roll the ECS fallback onto the freshly-built image
        if: steps.guard.outputs.exists == 'true'
        run: |
          set -euo pipefail
          # The kortix-dev task definition pins kortix/kortix-api:dev-latest (the
          # tag-api job just pushed it), so force-new-deployment re-pulls that tag
          # and rolls the standby — same tracking model as the EKS primary.
          echo "Rolling ECS fallback $SERVICE onto :dev-latest…"
          DEP_ID="$(aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[?status==`PRIMARY`]|[0].id' --output text)"
          # `wait services-stable` returns success even if the deployment circuit
          # breaker rolled OUR deployment back (the service is "stable" again on
          # the prior task set). So verify the deployment WE triggered actually
          # completed and is still PRIMARY — else it was rolled back → go red.
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE" || true
          STATE="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query "services[0].deployments[?id=='$DEP_ID']|[0].rolloutState" --output text)"
          PRIMARY_ID="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`]|[0].id' --output text)"
          if [ "$STATE" = "FAILED" ] || { [ "$STATE" != "COMPLETED" ] && [ "$PRIMARY_ID" != "$DEP_ID" ]; }; then
            echo "::error::dev ECS fallback roll failed/rolled back (deployment $DEP_ID state=$STATE, primary=$PRIMARY_ID). Recent events:"
            aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].events[0:6].message' --output text || true
            exit 1
          fi
          echo "✓ ECS fallback rolled (deployment $DEP_ID COMPLETED)"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].{running:runningCount,desired:desiredCount,rollout:deployments[0].rolloutState}' \
            --output table

      - name: Summary
        if: always() && steps.guard.outputs.exists == 'true'
        run: |
          h="$(curl -s --max-time 10 "https://dev-api-ecs-fargate.kortix.com/v1/health" || true)"
          {
            echo "### Deployed API → **dev** (ECS Fargate fallback)"
            echo "Rolled \`kortix/kortix-api:dev-latest\` onto ECS service \`kortix-dev\` (standby behind dev-api-ecs-fargate)."
            echo "Live: \`$(printf '%s' "$h" | jq -c '{version,commit,environment}' 2>/dev/null || echo '?')\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build + push the multi-arch gateway image ───────────────────────────────
  # Standalone LLM gateway (apps/llm-gateway). Same dev-<sha8> versioning + GitOps
  # roll as the API, into the SAME kortix-dev namespace (reuses kortix-api-env).
  build-gateway:
    name: Build gateway image (multi-arch)
    needs: [detect-changes, dev-version]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/llm-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KORTIX_VERSION=${{ needs.dev-version.outputs.version }}
            KORTIX_COMMIT=${{ github.sha }}
          tags: |
            kortix/kortix-gateway:dev-latest

  tag-gateway:
    name: Tag gateway dev-<sha8>
    needs: [detect-changes, build-gateway]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag :dev-latest → :dev-<sha8> (multi-arch manifest)
        run: |
          set -euo pipefail
          SHA8="${GITHUB_SHA::8}"
          docker buildx imagetools create \
            --tag "kortix/kortix-gateway:dev-${SHA8}" \
            "kortix/kortix-gateway:dev-latest"

  deploy-gateway:
    name: Deploy gateway to dev (EKS / GitOps)
    needs: [detect-changes, tag-gateway]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → read the dev cluster
      contents: write # push the values bump to main
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-dev-eks
      NAMESPACE: kortix-dev
      APP: kortix-gateway
      VALUES: infra/k8s/envs/dev/gateway-values.yaml
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy-dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump dev gateway image tag + commit
        id: bump
        run: |
          set -euo pipefail
          TAG="dev-${GITHUB_SHA::8}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$(yq '.image.tag' "$VALUES")" = "$TAG" ]; then
            echo "values already at $TAG — no commit needed."
          else
            TAG="$TAG" yq -i '.image.tag = strenv(TAG)' "$VALUES"
            git config user.name  "kortix-ci[bot]"
            git config user.email "kortix-ci[bot]@users.noreply.github.com"
            git add "$VALUES"
            git commit -m "chore(dev-eks): deploy gateway ${TAG} [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push origin main && break
              echo "push attempt ${attempt} lost a race — retrying"; sleep 3
            done
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — cluster exists
        id: guard
        run: |
          if aws eks describe-cluster --name "$CLUSTER" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::dev-eks cluster not found — bump committed, skipping watch."
          fi

      - name: Update kubeconfig
        if: steps.guard.outputs.exists == 'true'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      # Soft wait: the gateway Ingress chart fails to render until gateway-values
      # carries the ACM cert ARN, so the FIRST deploy (pre-cert) can't roll out.
      # Tolerate it — the tag bump is committed regardless, and once the cert ARN
      # is filled in, Argo rolls this image.
      - name: Wait for gateway Deployment rolled out @ ${{ steps.bump.outputs.tag }}
        if: steps.guard.outputs.exists == 'true'
        continue-on-error: true
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -uo pipefail
          for i in $(seq 1 40); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/40) image=${img:-?} available=${avail:-0}/${desired:-?}"
            if printf '%s' "$img" | grep -q ":${TAG}$" && [ -n "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "✓ EKS dev gateway rolled out on :${TAG}"; exit 0
            fi
            sleep 15
          done
          echo "::warning::dev gateway not rolled out to :${TAG} (likely missing ACM cert ARN in gateway-values, or Argo lag)."

  # ── Build + push the multi-arch frontend image ──────────────────────────────
  # dev.kortix.com is served by Vercel (auto-deploys from `main`); this image is
  # for self-hosters, so there is no deploy step here.
  build-frontend:
    name: Build frontend image (multi-arch)
    needs: [detect-changes, dev-version]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"
      - name: Build frontend standalone output
        run: pnpm --filter ./apps/web build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8008/v1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: local-build-placeholder-anon-key
          NEXT_PUBLIC_BILLING_ENABLED: "false"
          NEXT_PUBLIC_KORTIX_VERSION: ${{ needs.dev-version.outputs.version }}
          NEXT_OUTPUT: standalone
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            kortix/kortix-frontend:dev-latest
      - name: Retag :dev-latest → :dev-<sha8>
        run: |
          set -euo pipefail
          SHA8="${GITHUB_SHA::8}"
          docker buildx imagetools create \
            --tag "kortix/kortix-frontend:dev-${SHA8}" \
            "kortix/kortix-frontend:dev-latest"
          echo "Pushed kortix/kortix-frontend:dev-${SHA8} + :dev-latest"

  # ── Build dev CLI (4 targets on one Linux runner via Bun cross-compile) ─────
  build-cli:
    name: Build dev CLI (all targets)
    needs: [detect-changes, dev-version]
    if: needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps (pnpm)
        # The repo's lockfile is pnpm format; `bun install` cannot migrate it
        # ("PnpmLockfileTooOld"), so install deps with pnpm and compile with bun.
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build every target (Bun cross-compile)
        run: |
          set -euo pipefail
          CLI_VERSION="${{ needs.dev-version.outputs.version }}"
          API_BASE="https://dev-api.kortix.com"
          mkdir -p artifacts
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "↻ building kortix-$t (cli $CLI_VERSION)"
            bun build \
              --compile \
              --minify \
              --target="bun-$t" \
              --define="process.env.KORTIX_CLI_VERSION=\"${CLI_VERSION}\"" \
              --define="process.env.KORTIX_DEFAULT_API_BASE=\"${API_BASE}\"" \
              --outfile="artifacts/kortix-$t" \
              apps/cli/src/index.ts
          done
          cd artifacts
          chmod +x kortix-*
          sha256sum kortix-* > SHA256SUMS
          ls -lh

      - name: Smoke test (native linux-x64)
        run: ./artifacts/kortix-linux-x64 version

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
            artifacts/SHA256SUMS
          if-no-files-found: error

  # ── Publish/refresh the mutable `dev-latest` prerelease (CLI binaries) ──────
  # CLI-only and depends solely on build-cli, so a slow/scarce desktop runner can
  # never block the dev CLI channel (`kortix update` --dev).
  publish-dev-release:
    name: Publish dev-latest prerelease
    needs: [detect-changes, build-cli]
    if: needs.detect-changes.outputs.cli == 'true' && needs.build-cli.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: release/

      - name: List assets
        run: ls -lh release/

      - name: Move dev-latest tag to this commit
        run: |
          git tag -f dev-latest "$GITHUB_SHA"
          git push -f origin dev-latest

      - name: Publish GitHub prerelease (dev-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: dev-latest
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Mutable DEV CLI build for `${{ github.sha }}`.

            Install: `curl -fsSL https://kortix.com/install | KORTIX_CHANNEL=dev bash`
            Defaults to `https://dev-api.kortix.com`.
          files: |
            release/*
